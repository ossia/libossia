name: Coverage

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/latest-ubuntu-toolchain
      - name: Install Dependencies
        run: |
          sudo gem install coveralls-lcov

          sudo apt-get install -yqq python3 python3-pip lcov build-essential gcovr
          # setuptools >= 81 dropped pkg_resources, which fastcov's setup.py
          # still imports; pin below 81. Same for wheel: --ignore-installed lets
          # pip override the dpkg-managed python3-wheel on Ubuntu 24.04.
          # --no-build-isolation makes pip use this pinned setuptools when
          # building fastcov below; otherwise PEP 517 spins up a fresh build
          # env with current (>=81) setuptools and pkg_resources disappears.
          sudo pip3 install --break-system-packages --ignore-installed --upgrade wheel "setuptools<81"
          sudo pip3 install --break-system-packages --no-build-isolation git+https://github.com/rpgillespie6/fastcov.git

      - name: Build
        run: |
          QT_ENV_SCRIPT=$(find /opt -name 'qt*-env.sh')
          set +e
          # shellcheck disable=SC1090
          source "$QT_ENV_SCRIPT"
          set -e

          cmake -B build -S ${GITHUB_WORKSPACE} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOSSIA_TESTING=1 \
            -DOSSIA_COVERAGE=1 \
            -DPORTAUDIO_ONLY_DYNAMIC=1 \
            -DOSSIA_PD=0 \
            -DOSSIA_QT=1 \
            -DOSSIA_C=1
          cmake --build build -- -j2
          cmake --build build --target ossia_coverage || true
          rm -rf **/*.o

          find . -name '*.info'

      - name: Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ${{ github.workspace }}/build/coverage.info
